name: Build Android APK

on:
  # push:
  #  branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código fuente
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar Rust (SOLO AARCH64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Instalar pnpm y dependencias
        run: |
          npm install -g pnpm@10.33.4
          pnpm install

      - name: 🛠️ Crear script de parcheo infalible
        run: |
          cat << 'EOF' > patch.cjs
          const fs = require("fs");
          const path = require("path");

          // 1. Evitar compilación de Linux en Turborepo
          const pkgPath = "./packages/player/package.json";
          if (fs.existsSync(pkgPath)) {
            let pkg = JSON.parse(fs.readFileSync(pkgPath));
            if (pkg.scripts && pkg.scripts.build) {
              pkg.scripts.build = pkg.scripts["build:frontend"] || "tsc && vite build";
              fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
              console.log("✔️ package.json parcheado");
            }
          }

          // 2. Whitelist de permisos Android
          const capsDir = "./packages/player/src-tauri/capabilities";
          const permitidos = ["core:", "dialog:", "fs:", "log:", "opener:", "store:", "upload:", "http:", "network:"];
          if (fs.existsSync(capsDir)) {
            const files = fs.readdirSync(capsDir).filter(f => f.endsWith(".json"));
            for (const file of files) {
              const fPath = path.join(capsDir, file);
              try {
                const data = JSON.parse(fs.readFileSync(fPath, "utf8"));
                if (data.permissions) {
                  data.permissions = data.permissions.filter(p => {
                    const pName = typeof p === "string" ? p : p.identifier;
                    return pName && permitidos.some(prefix => pName.startsWith(prefix));
                  });
                  fs.writeFileSync(fPath, JSON.stringify(data, null, 2));
                }
              } catch(e) {}
            }
          }

          // 3. Extirpar plugins de escritorio de tauri.conf
          const confPath = "./packages/player/src-tauri/tauri.conf.json";
          if (fs.existsSync(confPath)) {
            let conf = JSON.parse(fs.readFileSync(confPath));
            if (!conf.plugins) conf.plugins = {};
            delete conf.plugins.process;
            delete conf.plugins["window-state"];
            if (conf.bundle && conf.bundle.updater) delete conf.bundle.updater;
            conf.plugins.updater = { pubkey: "dW5hX2NsYXZlX3B1YmxpY2FfZmFsc2FfcGFyYV9lbmdhbmFyX2FsX2J1bmRsZXI=", endpoints: [] };
            fs.writeFileSync(confPath, JSON.stringify(conf, null, 2));
            console.log("✔️ tauri.conf.json parcheado");
          }

          // 4. Purgar dependencias de Cargo.toml
          const cargoPath = "./packages/player/src-tauri/Cargo.toml";
          if (fs.existsSync(cargoPath)) {
            let cargoLines = fs.readFileSync(cargoPath, "utf8").split("\n");
            cargoLines = cargoLines.filter(line => 
              !line.includes("tauri-plugin-updater") &&
              !line.includes("tauri-plugin-process") &&
              !line.includes("tauri-plugin-window-state")
            );
            fs.writeFileSync(cargoPath, cargoLines.join("\n"));
            console.log("✔️ Cargo.toml parcheado");
          }

          // 5. RUST: Módulo Fantasma Dinámico
          const dummyMod = `
          pub mod dummy_plugin {
              pub struct Builder;
              impl Builder {
                  pub fn default() -> Self { Self }
                  pub fn new() -> Self { Self }
                  pub fn build<R: tauri::Runtime>(self) -> tauri::plugin::TauriPlugin<R> { tauri::plugin::Builder::new("dummy").build() }
              }
              pub fn init<R: tauri::Runtime>() -> tauri::plugin::TauriPlugin<R> { tauri::plugin::Builder::new("dummy").build() }
          }
          `;
          const rsDirs = ["./packages/player/src-tauri/src/lib.rs", "./packages/player/src-tauri/src/setup.rs", "./packages/player/src-tauri/src/main.rs"];
          rsDirs.forEach(f => {
            if (fs.existsSync(f)) {
              let code = fs.readFileSync(f, "utf8");
              if (code.includes("tauri_plugin_window_state") || code.includes("tauri_plugin_updater") || code.includes("tauri_plugin_process")) {
                code = code.replace(/tauri_plugin_window_state/g, "crate::dummy_plugin");
                code = code.replace(/tauri_plugin_updater/g, "crate::dummy_plugin");
                code = code.replace(/tauri_plugin_process/g, "crate::dummy_plugin");
                if (!code.includes("pub mod dummy_plugin")) {
                  code = dummyMod + "\n" + code;
                }
                fs.writeFileSync(f, code);
                console.log("✔️ Plugins neutralizados con alias en", f);
              }
            }
          });

          // 6. RUST YT-DLP: Retorno inyectado a la fuerza
          const ytdlpPath = "./packages/player/src-tauri/src/ytdlp_setup.rs";
          if (fs.existsSync(ytdlpPath)) {
            let code = fs.readFileSync(ytdlpPath, "utf8");
            code = code.replace(/fn\s+release_filename.*?\{/g, "fn release_filename() -> &'static str { return \"yt-dlp\";");
            code = code.replace(/fn\s+binary_name.*?\{/g, "fn binary_name() -> &'static str { return \"yt-dlp\";");
            fs.writeFileSync(ytdlpPath, code);
            console.log("✔️ yt-dlp parcheado para Android");
          }

          // 7. PARCHE PARA ESBUILD EN ANDROID (WASM URL ABSOLUTA)
          const compilerPath = "./packages/player/src/services/plugins/pluginCompiler.ts";
          if (fs.existsSync(compilerPath)) {
            let code = fs.readFileSync(compilerPath, "utf8");
            code = code.replace(
              /await es\.mod\.initialize\(\{[\s\S]*?wasmURL:\s*wasmUrl,[\s\S]*?worker:\s*false\s*\}\);/g,
              `const fullWasmUrl = new URL(wasmUrl, window.location.origin).href;\n      await es.mod.initialize({ wasmURL: fullWasmUrl, worker: false });`
            );
            fs.writeFileSync(compilerPath, code);
            console.log("✔️ pluginCompiler.ts parcheado (WASM URL estabilizada para WebView)");
          }

          // 8. PARCHE PARA ERROR DE RUTAS EN TAURI MOBILE (Conflicto BaseDirectory)
          const dirPath = "./packages/player/src/services/plugins/pluginDir.ts";
          if (fs.existsSync(dirPath)) {
            let code = fs.readFileSync(dirPath, "utf8");
            code = code.replace(/await remove\(destination,\s*\{[^}]*baseDir:\s*BaseDirectory\.AppData,?\s*\}\);/g,
                                "await remove(destination, { recursive: true });");
            code = code.replace(/await mkdir\(destination,\s*\{[^}]*baseDir:\s*BaseDirectory\.AppData,?\s*\}\);/g,
                                "await mkdir(destination, { recursive: true });");
            fs.writeFileSync(dirPath, code);
            console.log("✔️ pluginDir.ts parcheado (Resolución de rutas absolutas corregida)");
          }
          EOF

      - name: 🛠️ Ejecutar Parches
        run: node patch.cjs

      - name: 🛠️ Inyectar Sondas y Parches Táctiles (Debug)
        run: |
          # 1. BÚSQUEDA DINÁMICA DEL TYPESCRIPT Y SOBRESCRITURA
          TS_FILE=$(find ./packages/player/src -name "useInstallPlugin.ts" | head -n 1)
          if [ -z "$TS_FILE" ]; then
            echo "❌ ERROR: No se encontró useInstallPlugin.ts. La compilación fallará."
            exit 1
          fi
          
          echo "✔️ Archivo TypeScript encontrado en: $TS_FILE. Sobrescribiendo..."
          
          cat << 'EOF' > "$TS_FILE"
          import { useMutation } from '@tanstack/react-query';
          import { toast } from 'sonner';

          import { useTranslation } from '@nuclearplayer/i18n';

          import {
            pluginMarketplaceApi,
            type MarketplacePlugin,
          } from '../apis/pluginMarketplaceApi';
          import {
            cleanupDownload,
            downloadAndExtractPlugin,
          } from '../services/plugins/pluginDownloader';
          import { upsertRegistryEntry } from '../services/plugins/pluginRegistry';
          import { usePluginStore } from '../stores/pluginStore';
          import { resolveErrorMessage } from '../utils/logging';

          type InstallPluginParams = {
            plugin: MarketplacePlugin;
          };

          export const useInstallPlugin = () => {
            const { t } = useTranslation('plugins');
            const loadPluginFromPath = usePluginStore((s) => s.loadPluginFromPath);
            const enablePlugin = usePluginStore((s) => s.enablePlugin);

            return useMutation({
              mutationFn: async ({ plugin }: InstallPluginParams) => {
                console.log(`[DEBUG PLUGIN] 1. Iniciando instalación de: ${plugin.id}`);

                const release = await pluginMarketplaceApi.getLatestRelease(plugin.repo);
                console.log(`[DEBUG PLUGIN] 2. Release obtenida: URL -> ${release.downloadUrl}`);

                console.log(`[DEBUG PLUGIN] 3. Descargando y extrayendo...`);
                const extractedPath = await downloadAndExtractPlugin({
                  pluginId: plugin.id,
                  downloadUrl: release.downloadUrl,
                });
                console.log(`[DEBUG PLUGIN] 4. Extraído correctamente en: ${extractedPath}`);

                try {
                  const now = new Date().toISOString();
                  console.log(`[DEBUG PLUGIN] 5. Actualizando registro...`);
                  await upsertRegistryEntry({
                    id: plugin.id,
                    version: release.version,
                    path: extractedPath,
                    installationMethod: 'store',
                    enabled: false,
                    installedAt: now,
                    lastUpdatedAt: now,
                  });

                  console.log(`[DEBUG PLUGIN] 6. Cargando plugin desde la ruta...`);
                  await loadPluginFromPath(extractedPath);

                  console.log(`[DEBUG PLUGIN] 7. Habilitando plugin...`);
                  await enablePlugin(plugin.id);

                  console.log(`[DEBUG PLUGIN] 8. INSTALACIÓN COMPLETADA CON ÉXITO.`);
                } catch (error) {
                  console.error(`[DEBUG PLUGIN FATAL ERROR] Fallo en la fase de carga/registro:`, error);
                  throw error;
                } finally {
                  console.log(`[DEBUG PLUGIN] 9. Limpiando archivos temporales...`);
                  await cleanupDownload(plugin.id);
                }

                return { plugin, version: release.version };
              },
              onError: (error, { plugin }) => {
                const message = resolveErrorMessage(error);
                toast.error(t('store.installError.title', { name: plugin.name }), {
                  description: message,
                });
              },
            });
          };
          EOF
          
          # 2. LOCALIZACIÓN E INYECCIÓN DIRECTA EN LA CARPETA PUBLIC (ESTÁTICOS DE VITE)
          PUBLIC_DIR="./packages/player/public"
          if [ ! -d "$PUBLIC_DIR" ]; then
            PUBLIC_DIR=$(find ./packages/player -type d -name "public" | head -n 1)
          fi

          if [ -n "$PUBLIC_DIR" ]; then
            CSS_FILE="$PUBLIC_DIR/android-fixes.css"
            echo "✔️ Carpeta estática detectada en: $PUBLIC_DIR. Generando $CSS_FILE..."
            cat << 'EOF' > "$CSS_FILE"
          /* ==========================================================================
             PARCHE DE INTERFAZ MÓVIL PARA NUCLEAR PLAYER - COMPLETAMENTE COMENTADO
             ========================================================================== */

          /* --------------------------------------------------------------------------
             1. AJUSTES DE LA PANTALLA PRINCIPAL Y LA BARRA SUPERIOR (NOTCH)
             -------------------------------------------------------------------------- */
          body, #root {
              padding: 0 !important;
              overscroll-behavior-y: none;
              overflow-x: hidden;
          }

          [data-tauri-drag-region], .titlebar {
              display: flex !important;
              /* ALTURA DEL NOTCH: Si la pantalla principal se ve muy abajo, disminuye este número (ej: 16px) */
              padding-top: env(safe-area-inset-top, 24px) !important; 
              height: auto !important;
              -webkit-app-region: no-drag !important; 
          }

          /* --------------------------------------------------------------------------
             2. CONTROL TOTAL DE LA VENTANA DE AJUSTES (EL CUADRO FLOTANTE)
             -------------------------------------------------------------------------- */
          @media screen and (max-width: 768px) {
              
              [role="dialog"] {
                  /* POSICIÓN: Mantiene la ventana flotando en el centro exacto de la pantalla móviles */
                  position: fixed !important;
                  top: 50% !important;        /* <- UBICACIÓN VERTICAL: 50% es el centro exacto de la pantalla */
                  left: 50% !important;       /* <- UBICACIÓN HORIZONTAL: 50% es el centro exacto de la pantalla */
                  transform: translate(-50%, -50%) !important; /* <- CENTRADO MATEMÁTICO ABSOLUTO: No tocar */
                  
                  /* DIMENSIONES DE LA VENTANA: Modifica estos valores para cambiar el tamaño del cuadro */
                  width: 95vw !important;     /* <- ANCHO: 95vw significa 95% del ancho de tu pantalla móvil */
                  max-width: 95vw !important; 
                  height: 82vh !important;    /* <- ALTO: 82vh significa 82% del alto de tu pantalla móvil */
                  max-height: 82vh !important;
                  
                  /* ESTÉTICA DE LA VENTANA */
                  display: flex !important;
                  flex-direction: column !important; /* <- FUERZA APILAMIENTO: Asegura menú arriba y contenido abajo */
                  border-radius: 14px !important;    /* <- BORDES REDONDEADOS: Más alto el número = más redondo (ej: 20px) */
                  background-color: #111111 !important; /* <- COLOR DE FONDO: Fuerza un color oscuro sólido para evitar transparencias */
                  border: 1px solid rgba(255, 255, 255, 0.1) !important; /* <- BORDE: Línea sutil gris alrededor de la ventana */
                  
                  /* ESCALADO/ZOOM: Controla el tamaño de todo lo que esté dentro de los ajustes */
                  zoom: 0.90 !important;      /* <- ZOOM GENERAL: 0.90 hace todo un 10% más pequeño. Súbelo a 1.00 si lo ves muy chiquito */
              }

              /* --------------------------------------------------------------------------
                 3. DESMONTAJE DEL DISEÑO ESTRECHO DE PC (FUERZA DE ANCHO COMPLETO)
                 -------------------------------------------------------------------------- */
              /* Obligamos a TODOS los contenedores intermedios de Tailwind a ocupar el 100% del cuadro */
              [role="dialog"] div, 
              [role="dialog"] form, 
              [role="dialog"] section {
                  display: flex !important;
                  flex-direction: column !important; /* <- Convierte las filas de PC en columnas móviles */
                  width: 100% !important;            /* <- SOLUCIÓN AL ANCHO ESTRECHO: Fuerza el 100% de la ventana */
                  max-width: 100% !important;
                  height: auto !important;
              }

              /* --------------------------------------------------------------------------
                 4. PARCHE PARA EL MENÚ (CONVERTIR EN PESTAÑAS HORIZONTALES SUPERIORES)
                 -------------------------------------------------------------------------- */
              /* Target directo a cualquier sistema de navegación o barra lateral dentro del diálogo */
              [role="dialog"] [role="tablist"],
              [role="dialog"] nav,
              [role="dialog"] aside,
              [role="dialog"] [class*="menu" i],
              [role="dialog"] [class*="sidebar" i] {
                  display: flex !important;
                  flex-direction: row !important;    /* <- ¡OBLIGA AL MENÚ A SER HORIZONTAL! */
                  width: 100% !important;
                  max-width: 100% !important;
                  height: auto !important;
                  
                  /* DESLIZAMIENTO: Permite mover el dedo a los lados (scroll horizontal) si las pestañas no caben */
                  overflow-x: auto !important;       
                  overflow-y: hidden !important;
                  white-space: nowrap !important;    /* <- EVITA SALTOS DE LÍNEA: Las pestañas se quedan en una sola línea recta */
                  
                  /* ESTÉTICA DE LA BARRA DE PESTAÑAS */
                  border-right: none !important;     /* Quita la línea divisoria vertical de PC */
                  border-bottom: 2px solid rgba(255, 255, 255, 0.1) !important; /* <- LÍNEA HORIZONTAL debajo del menú */
                  padding: 8px 4px !important;       /* <- ESPACIADO INTERNO: Margen dentro de la barra de pestañas */
                  margin-bottom: 14px !important;    /* <- MARGEN INFERIOR: Separación entre el menú y las opciones de abajo */
              }

              /* Ajuste de los botones individuales de las pestañas para que no se estiren */
              [role="dialog"] [role="tab"],
              [role="dialog"] nav > *,
              [role="dialog"] aside > *,
              [role="dialog"] [class*="menu" i] > *,
              [role="dialog"] [class*="sidebar" i] > * {
                  flex: 0 0 auto !important;         /* <- ANTI-ESTIRAMIENTO: Evita que el botón ocupe toda la pantalla */
                  width: fit-content !important;     /* <- ANCHO JUSTO: El botón mide exactamente lo que mide su texto */
                  padding: 8px 14px !important;      /* <- TAMAÑO DEL BOTÓN: Relleno interno (Arriba/Abajo e Izquierda/Derecha) */
                  margin-right: 6px !important;      /* <- SEPARACIÓN: Espacio libre entre una pestaña y la siguiente */
              }

              /* --------------------------------------------------------------------------
                 5. PARCHE PARA EL CONTENIDO (EL PANEL DE OPCIONES DE CONFIGURACIÓN)
                 -------------------------------------------------------------------------- */
              /* Apuntamos al contenedor donde se muestran los interruptores y selectores */
              [role="dialog"] [role="tabpanel"],
              [role="dialog"] main,
              [role="dialog"] [class*="content" i] {
                  display: flex !important;
                  flex-direction: column !important; /* Las opciones se apilan una debajo de otra */
                  flex: 1 1 auto !important;         /* <- RELLENO DINÁMICO: Estira el panel para ocupar todo el alto libre hasta el fondo */
                  width: 100% !important;
                  max-width: 100% !important;
                  
                  /* SCROLL VERTICAL: Activa el deslizamiento hacia abajo para leer todos los ajustes */
                  overflow-y: auto !important;       
                  overflow-x: hidden !important;
                  padding: 12px !important;          /* <- MARGEN INTERNO: Separación para que las opciones no toquen el borde del cuadro */
              }

              /* FILAS DE AJUSTES INDIVIDUALES: Ajusta el texto a la izquierda y el botón a la derecha */
              [role="tabpanel"] > div,
              [class*="content" i] > div,
              [role="dialog"] [class*="setting" i] {
                  display: flex !important;
                  flex-direction: row !important;    /* <- Pone el Nombre del ajuste a la izquierda y su Interruptor a la derecha */
                  flex-wrap: wrap !important;        /* <- FLUIDO: Si el móvil es muy estrecho, el botón baja para no romper el diseño */
                  justify-content: space-between !important; /* <- SEPARACIÓN MAXIMA: Empuja el texto a la izquierda y el botón a la derecha */
                  align-items: center !important;    /* Centrado vertical perfecto entre el texto y el interruptor */
                  width: 100% !important;
                  padding: 14px 0 !important;        /* <- DISTANCIA ENTRE AJUSTES: Espacio libre entre una opción y otra */
                  border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important; /* <- LÍNEA DIVISORIA sutil entre ajustes */
              }

              /* --------------------------------------------------------------------------
                 6. TEXTOS, SELECCIONES E INPUTS (ANTI-DESBORDAMIENTO TÁCTIL)
                 -------------------------------------------------------------------------- */
              [role="dialog"] p, 
              [role="dialog"] span, 
              [role="dialog"] label,
              [role="dialog"] h1, [role="dialog"] h2 {
                  white-space: normal !important;    /* <- PERMITE SALTO DE LÍNEA: Si la explicación del ajuste es larga, baja y no se corta */
                  word-wrap: break-word !important; 
                  font-size: 0.95rem !important;     /* <- TAMAÑO DE LA LETRA de las descripciones */
              }

              [role="dialog"] input, 
              [role="dialog"] select, 
              [role="dialog"] .dropdown {
                  width: auto !important;            /* Evita que los selectores se estiren a lo ancho de forma fea */
                  max-width: 100% !important;
                  min-height: 38px !important;       /* <- ALTURA TÁCTIL MÍNIMA para que sea cómodo pulsar las opciones */
              }
          }

          /* --------------------------------------------------------------------------
             7. PARCHE DE EMERGENCIA PARA BOTONES (Z-INDEX Y POINTER EVENTS)
             -------------------------------------------------------------------------- */
          [role="dialog"] button,
          [role="dialog"] [role="button"],
          [role="dialog"] input[type="checkbox"],
          [class*="install-button" i] {
              position: relative !important;
              z-index: 9999 !important;
              pointer-events: auto !important;
          }

          [role="dialog"] p, [role="dialog"] span {
              pointer-events: none !important;
          }
          EOF
          else
            echo "❌ ERROR: No se encontró el directorio estático 'public' dentro de packages/player."
            exit 1
          fi

      - name: 🛠️ Aplicar UI de Android (Arquitectura Shadowing)
        run: |
          if [ -d "android_ui" ]; then
            cp -a android_ui/. ./
            echo "¡Archivos de UI personalizados inyectados con éxito en la RAM!"
          else
            echo "No se detectó carpeta 'android_ui'. Se utilizará la UI de escritorio original."
          fi
          
      - name: Compilar Frontend y Dependencias (React)
        run: pnpm run build --filter "@nuclearplayer/player"

      - name: Construir y Compilar APK (Tauri Android - DEBUG)
        run: |
          cd packages/player
          
          rm -rf src-tauri/gen/android
          
          npx tauri android init
          
          cp public/logo-icon-on-white.png src-tauri/icons/icon.png
          cp public/logo-icon-on-white.png src-tauri/icons/app-icon.png
          
          npx tauri icon public/logo-icon-on-white.png
          
          npx tauri android build --debug --apk --target aarch64

      - name: Subir APK final
        uses: actions/upload-artifact@v4
        with:
          name: Nuclear-Player-APK
          path: packages/player/src-tauri/gen/android/**/*.apk

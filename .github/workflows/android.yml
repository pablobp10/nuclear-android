name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código fuente
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Instalar pnpm (Versión estricta) y dependencias
        run: |
          npm install -g pnpm@10.33.4
          pnpm install

      - name: Compilar Frontend y Dependencias (React)
        # Volvemos al comando original
        run: pnpm run build --filter "@nuclearplayer/player"

      - name: Compilar APK (Tauri Android)
        run: |
          cd packages/player
          npx tauri android build

      - name: Subir APK final
        uses: actions/upload-artifact@v4
        with:
          name: Nuclear-Player-APK
          path: packages/player/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

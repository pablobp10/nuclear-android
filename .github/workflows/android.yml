name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código fuente
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Instalar pnpm (Versión estricta) y dependencias
        run: |
          npm install -g pnpm@10.33.4
          pnpm install

      - name: Compilar Frontend (React)
        run: pnpm run build --filter "@nuclearplayer/player"

      - name: 💥 Purgar Permisos de Updater (Fix para Android) 💥
        # Buscamos en todos los archivos JSON dentro de capabilities y borramos cualquier línea que contenga "updater:"
        run: |
          find packages/player/src-tauri/capabilities -type f -name "*.json" -exec sed -i '/"updater:[^"]*"/d' {} +
          # Y por si acaso, lo quitamos también de las dependencias nativas si existiera
          sed -i '/tauri-plugin-updater/d' packages/player/src-tauri/Cargo.toml

      - name: Compilar APK (Tauri)
        run: |
          cd packages/player
          npx tauri android build

      - name: Subir APK final
        uses: actions/upload-artifact@v4
        with:
          name: Nuclear-Player-APK
          path: packages/player/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

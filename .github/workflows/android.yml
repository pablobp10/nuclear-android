name: Build Android APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código fuente
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar Rust (SOLO AARCH64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Instalar pnpm y dependencias
        run: |
          npm install -g pnpm@10.33.4
          pnpm install

      - name: Crear script de parcheo de sistemas (patch.cjs)
        run: |
          cat << 'EOF' > patch.cjs
          const fs = require("fs");
          const path = require("path");

          // 1. Desactivar plugins incompatibles de escritorio
          const rustPath = "./packages/player/src-tauri/src/lib.rs";
          if (fs.existsSync(rustPath)) {
            let code = fs.readFileSync(rustPath, "utf8");
            code = code.replace(/tauri_plugin_window_state::Builder::default\(\)\.build\(\)/g, "tauri_plugin_window_state::Builder::default().build()");
            code = code.replace(/tauri_plugin_updater::Builder::new\(\)\.build\(\)/g, "tauri_plugin_updater::Builder::new().build()");
            code = code.replace(/\.plugin\(tauri_plugin_window_state::Builder::default\(\)\.build\(\)\)/g, "/* .plugin(window_state) */");
            fs.writeFileSync(rustPath, code);
          }

          // 2. CAPACIDADES DE TAURI: Autorización absoluta sobre la carpeta Interna AppData
          const capsDir = "./packages/player/src-tauri/capabilities";
          const permitidos = ["core:", "dialog:", "fs:", "log:", "opener:", "store:", "upload:", "http:", "network:"];
          if (fs.existsSync(capsDir)) {
            const files = fs.readdirSync(capsDir).filter(f => f.endsWith(".json"));
            for (const file of files) {
              const fPath = path.join(capsDir, file);
              try {
                const data = JSON.parse(fs.readFileSync(fPath, "utf8"));
                if (data.permissions) {
                  data.permissions = data.permissions.filter(p => {
                    const pName = typeof p === "string" ? p : p.identifier;
                    return pName && permitidos.some(prefix => pName.startsWith(prefix));
                  });
                  fs.writeFileSync(fPath, JSON.stringify(data, null, 2));
                }
              } catch(e) {}
            }
          }

          const almightyCap = {
            identifier: "android-almighty",
            windows: ["*"],
            permissions: [
              "core:window:allow-set-decorations",
              "core:window:allow-set-size",
              "core:window:allow-maximize",
              "core:window:allow-minimize",
              "core:window:allow-close",
              "core:window:allow-hide",
              "core:window:allow-show",
              "fs:allow-read",
              "fs:allow-write",
              "fs:allow-exists",
              "fs:allow-stat",
              "fs:allow-read-dir",
              "fs:allow-mkdir",
              "fs:allow-remove",
              "fs:scope-appdata-recursive"
            ]
          };
          fs.writeFileSync(path.join(capsDir, "android-almighty.json"), JSON.stringify(almightyCap, null, 2));

          // 3. AndroidManifest: Internet y Cleartext
          const manifestPath = path.join(__dirname, "packages/player/src-tauri/gen/android/app/src/main/AndroidManifest.xml");
          if (fs.existsSync(manifestPath)) {
            let manifest = fs.readFileSync(manifestPath, "utf8");
            if (!manifest.includes("android.permission.INTERNET")) {
              const permisosAndroid = `
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application`;
              manifest = manifest.replace("<application", permisosAndroid);
            }
            if (!manifest.includes('android:usesCleartextTraffic="true"')) {
              manifest = manifest.replace("<application", '<application android:usesCleartextTraffic="true"');
            }
            fs.writeFileSync(manifestPath, manifest);
          }

          // 4. Purgar dependencias de Cargo.toml
          const cargoPath = "./packages/player/src-tauri/Cargo.toml";
          if (fs.existsSync(cargoPath)) {
            let cargoLines = fs.readFileSync(cargoPath, "utf8").split("\n");
            cargoLines = cargoLines.filter(line => 
              !line.includes("tauri-plugin-updater") &&
              !line.includes("tauri-plugin-process") &&
              !line.includes("tauri-plugin-window-state")
            );
            fs.writeFileSync(cargoPath, cargoLines.join("\n"));
          }

          // 5. RUST: Módulo Fantasma Dinámico
          const dummyMod = `pub mod dummy_plugin { pub struct Builder; impl Builder { pub fn default() -> Self { Self } pub fn new() -> Self { Self } pub fn build<R: tauri::Runtime>(self) -> tauri::plugin::TauriPlugin<R> { tauri::plugin::Builder::new("dummy").build() } } pub fn init<R: tauri::Runtime>() -> tauri::plugin::TauriPlugin<R> { tauri::plugin::Builder::new("dummy").build() } }`;
          const rsDirs = ["./packages/player/src-tauri/src/lib.rs", "./packages/player/src-tauri/src/setup.rs", "./packages/player/src-tauri/src/main.rs"];
          rsDirs.forEach(f => {
            if (fs.existsSync(f)) {
              let code = fs.readFileSync(f, "utf8");
              if (code.includes("tauri_plugin_window_state") || code.includes("tauri_plugin_updater") || code.includes("tauri_plugin_process")) {
                code = code.replace(/tauri_plugin_window_state/g, "crate::dummy_plugin");
                code = code.replace(/tauri_plugin_updater/g, "crate::dummy_plugin");
                code = code.replace(/tauri_plugin_process/g, "crate::dummy_plugin");
                if (!code.includes("pub mod dummy_plugin")) { code = dummyMod + "\n" + code; }
                fs.writeFileSync(f, code);
              }
            }
          });

          // 6. RUST YT-DLP
          const ytdlpPath = "./packages/player/src-tauri/src/ytdlp_setup.rs";
          if (fs.existsSync(ytdlpPath)) {
            let code = fs.readFileSync(ytdlpPath, "utf8");
            code = code.replace(/fn\s+release_filename.*?\{/g, "fn release_filename() -> &'static str { return \"yt-dlp\";");
            code = code.replace(/fn\s+binary_name.*?\{/g, "fn binary_name() -> &'static str { return \"yt-dlp\";");
            fs.writeFileSync(ytdlpPath, code);
          }

          // 7. PARCHE PARA ESBUILD EN ANDROID
          const compilerPath = "./packages/player/src/services/plugins/pluginCompiler.ts";
          if (fs.existsSync(compilerPath)) {
            let code = fs.readFileSync(compilerPath, "utf8");
            code = code.replace(
              /await es\.mod\.initialize\(\{[\s\S]*?wasmURL:\s*wasmUrl,[\s\S]*?worker:\s*false\s*\}\);/g,
              `const fullWasmUrl = new URL(wasmUrl, window.location.origin).href;\n      await es.mod.initialize({ wasmURL: fullWasmUrl, worker: false });`
            );
            fs.writeFileSync(compilerPath, code);
          }

          // 8. PARCHE PARA ERROR DE RUTAS EN TAURI MOBILE
          const dirPath = "./packages/player/src/services/plugins/pluginDir.ts";
          if (fs.existsSync(dirPath)) {
            let code = fs.readFileSync(dirPath, "utf8");
            code = code.replace(/await remove\(destination,\s*\{[^}]*baseDir:\s*BaseDirectory\.AppData,?\s*\}\);/g,
                                "await remove(destination, { recursive: true });");
            code = code.replace(/await mkdir\(destination,\s*\{[^}]*baseDir:\s*BaseDirectory\.AppData,?\s*\}\);/g,
                                "await mkdir(destination, { recursive: true });");
            fs.writeFileSync(dirPath, code);
          }

          // 9. SUPER PARCHE DE FRONTEND: RUTAS LOCALES ESTÁTICAS Y BYPASS DE TLS
          function walkSync(currentDirPath, callback) {
            fs.readdirSync(currentDirPath).forEach(function (name) {
                var filePath = path.join(currentDirPath, name);
                var stat = fs.statSync(filePath);
                if (stat.isFile()) callback(filePath);
                else if (stat.isDirectory()) walkSync(filePath, callback);
            });
          }

          walkSync("./packages/player/src", function(filePath) {
            if (filePath.endsWith(".ts") || filePath.endsWith(".tsx")) {
              let code = fs.readFileSync(filePath, "utf8");
              let changed = false;

              // TU INYECCIÓN LOCAL: 100% Intacta, estática y comprobada.
              if (code.includes("@tauri-apps/plugin-dialog")) {
                code = `import { appDataDir as __tAppDataDir } from '@tauri-apps/api/path';\n` + code;
                code = code.replace(/import\s+\{[^}]*\}\s+from\s+['"]@tauri-apps\/plugin-dialog['"];?/g, 
                `const open = async (...args: any[]) => (await __tAppDataDir()) + "/NuclearPlugins/Manual"; const message = async (...args: any[]) => {}; const ask = async (...args: any[]) => true; const confirm = async (...args: any[]) => true; const save = async (...args: any[]) => (await __tAppDataDir()) + "/NuclearExport";`);
                changed = true;
              }

              // Mockeo de las funciones de redimensión de ventana
              if (code.includes("@tauri-apps/api/window")) {
                code = code.replace(/import\s+\{[^}]*\}\s+from\s+['"]@tauri-apps\/api\/window['"];?/g, 
                `const getCurrentWindow = () => ({ setDecorations: async (...args: any[]) => {}, setResizable: async (...args: any[]) => {}, maximize: async (...args: any[]) => {}, unmaximize: async (...args: any[]) => {}, minimize: async (...args: any[]) => {}, close: async (...args: any[]) => {}, hide: async (...args: any[]) => {}, show: async (...args: any[]) => {}, onCloseRequested: async (...args: any[]) => () => {}, onFocusChanged: async (...args: any[]) => () => {}, isMaximized: async () => false, isMinimized: async () => false, isFullscreen: async () => false } as any); const appWindow = getCurrentWindow();`);
                changed = true;
              }

              // NUEVA INYECCIÓN: Extirpamos el motor TLS de Rust y lo forzamos a WebView para la Tienda
              if (code.includes("@tauri-apps/plugin-http")) {
                code = code.replace(/import\s+\{[^}]*\}\s+from\s+['"]@tauri-apps\/plugin-http['"];?/g, 
                `const fetch = async (url, options) => {
                    let finalUrl = typeof url === 'string' ? url : (url?.url || url);
                    return await window.fetch(finalUrl, options);
                }; const getClient = async () => ({ request: fetch, get: (u, o) => fetch(u, { ...o, method: 'GET' }), post: (u, o) => fetch(u, { ...o, method: 'POST' }) });`);
                changed = true;
              }

              if (changed) {
                code = "// @ts-nocheck\n" + code;
                fs.writeFileSync(filePath, code);
              }
            }
          });

          // 10. INYECCIÓN DE JSZIP Y ELIMINACIÓN DE CSP
          const htmlPath = "./packages/player/index.html";
          if (fs.existsSync(htmlPath)) {
            let html = fs.readFileSync(htmlPath, "utf8");
            html = html.replace(/<meta[^>]*Content-Security-Policy[^>]*>/gi, "");
            const injection = `<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script><script>window.onerror = function(msg) { console.error('ERROR GLOBAL: ' + msg); return false; }; window.addEventListener('unhandledrejection', function(event) { console.error('PROMESA: ' + (event.reason?.message || event.reason)); });</script>`;
            html = html.replace("<head>", "<head>\n" + injection);
            fs.writeFileSync(htmlPath, html);
          }
          EOF

      - name: 🛠️ Ejecutar Parches de Sistema
        run: node patch.cjs

      - name: 🛠️ Parchear Hook de Módulos (Bypass de Red Sin Cabeceras + AppData)
        run: |
          TS_FILE=$(find ./packages/player/src -name "useInstallPlugin.ts" | head -n 1)
          if [ -n "$TS_FILE" ]; then
          cat << 'EOF' > "$TS_FILE"
          // @ts-nocheck
          import { useMutation } from '@tanstack/react-query';
          import { toast } from 'sonner';
          import { useTranslation } from '@nuclearplayer/i18n';
          import { pluginMarketplaceApi, type MarketplacePlugin } from '../apis/pluginMarketplaceApi';
          import { upsertRegistryEntry } from '../services/plugins/pluginRegistry';
          import { usePluginStore } from '../stores/pluginStore';
          import { resolveErrorMessage } from '../utils/logging';
          import { mkdir, writeFile } from '@tauri-apps/plugin-fs';
          import { appDataDir } from '@tauri-apps/api/path';

          type InstallPluginParams = { plugin: MarketplacePlugin; };

          export const useInstallPlugin = () => {
            const { t } = useTranslation('plugins');
            const loadPluginFromPath = usePluginStore((s) => s.loadPluginFromPath);
            const enablePlugin = usePluginStore((s) => s.enablePlugin);

            return useMutation({
              mutationFn: async ({ plugin }: InstallPluginParams) => {
                const release = await pluginMarketplaceApi.getLatestRelease(plugin.repo);
                
                const baseDir = await appDataDir();
                const safeDir = baseDir + "/NuclearPlugins/" + plugin.id;
                
                try {
                  // Matriz de Proxies para evadir la Política de CORS en el ZIP
                  const encodedUrl = encodeURIComponent(release.downloadUrl);
                  const proxies = [
                    "https://corsproxy.io/?" + encodedUrl,
                    "https://api.codetabs.com/v1/proxy?quest=" + encodedUrl,
                    "https://mirror.ghproxy.com/" + release.downloadUrl,
                    "https://ghproxy.net/" + release.downloadUrl
                  ];
                  
                  let res;
                  let arrayBuffer;
                  
                  for (const url of proxies) {
                    try {
                      res = await window.fetch(url); 
                      if (res.ok) {
                        arrayBuffer = await res.arrayBuffer();
                        break;
                      }
                    } catch(e) { console.warn("Proxy falló: ", url); }
                  }
                  
                  if (!arrayBuffer) throw new Error("Error HTTP 403: Todos los proxies web rechazaron la conexión CORS.");

                  const JSZip = window.JSZip;
                  const zip = await JSZip.loadAsync(arrayBuffer);

                  try { await mkdir(safeDir, { recursive: true }); } catch(e) {}

                  for (const [filename, fileData] of Object.entries(zip.files)) {
                    const fullPath = safeDir + "/" + filename;
                    if (fileData.dir) {
                      try { await mkdir(fullPath, { recursive: true }); } catch(e) {}
                    } else {
                      const parentDir = fullPath.substring(0, fullPath.lastIndexOf("/"));
                      try { await mkdir(parentDir, { recursive: true }); } catch(e) {}
                      const content = await fileData.async("uint8array");
                      await writeFile(fullPath, content);
                    }
                  }
                } catch(e) {
                  console.error("Fallo durante el puenteo de instalación:", e);
                  throw e;
                }

                const now = new Date().toISOString();
                await upsertRegistryEntry({
                  id: plugin.id, version: release.version, path: safeDir,
                  installationMethod: 'store', enabled: false,
                  installedAt: now, lastUpdatedAt: now,
                });
                
                await loadPluginFromPath(safeDir);
                await enablePlugin(plugin.id);
                
                toast.success("¡" + plugin.name + " instalado correctamente!");
                return { plugin, version: release.version };
              },
              onError: (error, { plugin }) => {
                const message = resolveErrorMessage(error);
                toast.error(t('store.installError.title', { name: plugin.name }), { description: message });
              },
            });
          };
          EOF
          fi

      - name: 🛠️ Aplicar Interfaz de Android (Shadowing de android_ui)
        run: |
          if [ -d "android_ui" ]; then
            cp -a android_ui/. ./
            echo "✅ Archivos estáticos aplicados en caliente."
          else
            echo "❌ ERROR CRÍTICO: Carpeta android_ui no encontrada."
            exit 1
          fi
          
      - name: Compilar Frontend y Dependencias (React)
        run: |
          cd packages/player
          pnpm run build:frontend

      - name: Construir y Compilar APK (Tauri Android - DEBUG)
        run: |
          cd packages/player
          rm -rf src-tauri/gen/android
          npx tauri android init
          cp public/logo-icon-on-white.png src-tauri/icons/icon.png
          cp public/logo-icon-on-white.png src-tauri/icons/app-icon.png
          npx tauri icon public/logo-icon-on-white.png
          npx tauri android build --debug --apk --target aarch64

      - name: Subir APK final
        uses: actions/upload-artifact@v4
        with:
          name: Nuclear-Player-APK
          path: packages/player/src-tauri/gen/android/**/*.apk

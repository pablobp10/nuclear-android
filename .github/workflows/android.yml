name: Build Android APK

on:
  # push:
  #  branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código fuente
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar Rust (SOLO AARCH64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Instalar pnpm y dependencias
        run: |
          npm install -g pnpm@10.33.4
          pnpm install

      - name: Crear script de parcheo (patch.cjs)
        run: |
          cat << 'EOF' > patch.cjs
          const fs = require("fs");
          const path = require("path");

          // 1. Desactivar plugins de escritorio incompatibles con móvil
          const rustPath = "./packages/player/src-tauri/src/lib.rs";
          if (fs.existsSync(rustPath)) {
            let code = fs.readFileSync(rustPath, "utf8");
            code = code.replace(/tauri_plugin_window_state::Builder::default\(\)\.build\(\)/g, "tauri_plugin_window_state::Builder::default().build()");
            code = code.replace(/tauri_plugin_updater::Builder::new\(\)\.build\(\)/g, "tauri_plugin_updater::Builder::new().build()");
            // Comentar el plugin de estado de ventana si causa error de compilación
            code = code.replace(/\.plugin\(tauri_plugin_window_state::Builder::default\(\)\.build\(\)\)/g, "/* .plugin(window_state) */");
            fs.writeFileSync(rustPath, code);
            console.log("✅ lib.rs parcheado (Plugins de escritorio neutralizados)");
          }

          // 2. Whitelist de capacidades de Tauri
          const capsDir = "./packages/player/src-tauri/capabilities";
          const permitidos = ["core:", "dialog:", "fs:", "log:", "opener:", "store:", "upload:", "http:", "network:"];
          if (fs.existsSync(capsDir)) {
            const files = fs.readdirSync(capsDir).filter(f => f.endsWith(".json"));
            for (const file of files) {
              const fPath = path.join(capsDir, file);
              try {
                const data = JSON.parse(fs.readFileSync(fPath, "utf8"));
                if (data.permissions) {
                  data.permissions = data.permissions.filter(p => {
                    const pName = typeof p === "string" ? p : p.identifier;
                    return pName && permitidos.some(prefix => pName.startsWith(prefix));
                  });
                  fs.writeFileSync(fPath, JSON.stringify(data, null, 2));
                }
              } catch(e) {}
            }
            console.log("✅ Capacidades de Tauri filtradas con permisos de Red.");
          }

          // 3. INYECCIÓN NATIVA DE ANDROID (PERMISOS OS Y CLEARTEXT)
          // Buscamos el Manifest de Android generado por Tauri
          const manifestPath = path.join(__dirname, "packages/player/src-tauri/gen/android/app/src/main/AndroidManifest.xml");
          
          if (fs.existsSync(manifestPath)) {
            let manifest = fs.readFileSync(manifestPath, "utf8");
            
            // A. Inyectar permisos de Red y Almacenamiento si no existen
            if (!manifest.includes("android.permission.INTERNET")) {
              const permisosAndroid = `
    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
    <application`;
              // Insertamos los permisos justo antes de abrir la etiqueta <application>
              manifest = manifest.replace("<application", permisosAndroid);
            }

            // B. Permitir tráfico HTTP inseguro (Cleartext)
            if (!manifest.includes('android:usesCleartextTraffic="true"')) {
              manifest = manifest.replace("<application", '<application android:usesCleartextTraffic="true"');
            }

            fs.writeFileSync(manifestPath, manifest);
            console.log("✅ AndroidManifest.xml hackeado (Permisos totales de SO inyectados).");
          } else {
            console.warn("⚠️ No se encontró AndroidManifest.xml (puede que se genere después).");
          }
          EOF

          // 4. Purgar dependencias de Cargo.toml
          const cargoPath = "./packages/player/src-tauri/Cargo.toml";
          if (fs.existsSync(cargoPath)) {
            let cargoLines = fs.readFileSync(cargoPath, "utf8").split("\n");
            cargoLines = cargoLines.filter(line => 
              !line.includes("tauri-plugin-updater") &&
              !line.includes("tauri-plugin-process") &&
              !line.includes("tauri-plugin-window-state")
            );
            fs.writeFileSync(cargoPath, cargoLines.join("\n"));
            console.log("✔️ Cargo.toml parcheado");
          }

          // 5. RUST: Módulo Fantasma Dinámico
          const dummyMod = `
          pub mod dummy_plugin {
              pub struct Builder;
              impl Builder {
                  pub fn default() -> Self { Self }
                  pub fn new() -> Self { Self }
                  pub fn build<R: tauri::Runtime>(self) -> tauri::plugin::TauriPlugin<R> { tauri::plugin::Builder::new("dummy").build() }
              }
              pub fn init<R: tauri::Runtime>() -> tauri::plugin::TauriPlugin<R> { tauri::plugin::Builder::new("dummy").build() }
          }
          `;
          const rsDirs = ["./packages/player/src-tauri/src/lib.rs", "./packages/player/src-tauri/src/setup.rs", "./packages/player/src-tauri/src/main.rs"];
          rsDirs.forEach(f => {
            if (fs.existsSync(f)) {
              let code = fs.readFileSync(f, "utf8");
              if (code.includes("tauri_plugin_window_state") || code.includes("tauri_plugin_updater") || code.includes("tauri_plugin_process")) {
                code = code.replace(/tauri_plugin_window_state/g, "crate::dummy_plugin");
                code = code.replace(/tauri_plugin_updater/g, "crate::dummy_plugin");
                code = code.replace(/tauri_plugin_process/g, "crate::dummy_plugin");
                if (!code.includes("pub mod dummy_plugin")) {
                  code = dummyMod + "\n" + code;
                }
                fs.writeFileSync(f, code);
                console.log("✔️ Plugins neutralizados con alias en", f);
              }
            }
          });

          // 6. RUST YT-DLP: Retorno inyectado a la fuerza
          const ytdlpPath = "./packages/player/src-tauri/src/ytdlp_setup.rs";
          if (fs.existsSync(ytdlpPath)) {
            let code = fs.readFileSync(ytdlpPath, "utf8");
            code = code.replace(/fn\s+release_filename.*?\{/g, "fn release_filename() -> &'static str { return \"yt-dlp\";");
            code = code.replace(/fn\s+binary_name.*?\{/g, "fn binary_name() -> &'static str { return \"yt-dlp\";");
            fs.writeFileSync(ytdlpPath, code);
            console.log("✔️ yt-dlp parcheado para Android");
          }

          // 7. PARCHE PARA ESBUILD EN ANDROID (WASM URL ABSOLUTA)
          const compilerPath = "./packages/player/src/services/plugins/pluginCompiler.ts";
          if (fs.existsSync(compilerPath)) {
            let code = fs.readFileSync(compilerPath, "utf8");
            code = code.replace(
              /await es\.mod\.initialize\(\{[\s\S]*?wasmURL:\s*wasmUrl,[\s\S]*?worker:\s*false\s*\}\);/g,
              `const fullWasmUrl = new URL(wasmUrl, window.location.origin).href;\n      await es.mod.initialize({ wasmURL: fullWasmUrl, worker: false });`
            );
            fs.writeFileSync(compilerPath, code);
            console.log("✔️ pluginCompiler.ts parcheado (WASM URL estabilizada para WebView)");
          }

          // 8. PARCHE PARA ERROR DE RUTAS EN TAURI MOBILE (Conflicto BaseDirectory)
          const dirPath = "./packages/player/src/services/plugins/pluginDir.ts";
          if (fs.existsSync(dirPath)) {
            let code = fs.readFileSync(dirPath, "utf8");
            code = code.replace(/await remove\(destination,\s*\{[^}]*baseDir:\s*BaseDirectory\.AppData,?\s*\}\);/g,
                                "await remove(destination, { recursive: true });");
            code = code.replace(/await mkdir\(destination,\s*\{[^}]*baseDir:\s*BaseDirectory\.AppData,?\s*\}\);/g,
                                "await mkdir(destination, { recursive: true });");
            fs.writeFileSync(dirPath, code);
            console.log("✔️ pluginDir.ts parcheado (Resolución de rutas absolutas corregida)");
          }
          EOF

      - name: 🛠️ Ejecutar Parches
        run: node patch.cjs

      - name: 🛠️ Inyectar Sondas y Parches Táctiles (Debug)
        run: |
          # 1. BÚSQUEDA DINÁMICA DEL TYPESCRIPT Y SOBRESCRITURA
          TS_FILE=$(find ./packages/player/src -name "useInstallPlugin.ts" | head -n 1)
          if [ -z "$TS_FILE" ]; then
            echo "❌ ERROR: No se encontró useInstallPlugin.ts. La compilación fallará."
            exit 1
          fi
          
          echo "✔️ Archivo TypeScript encontrado en: $TS_FILE. Sobrescribiendo..."
          
          cat << 'EOF' > "$TS_FILE"
          import { useMutation } from '@tanstack/react-query';
          import { toast } from 'sonner';

          import { useTranslation } from '@nuclearplayer/i18n';

          import {
            pluginMarketplaceApi,
            type MarketplacePlugin,
          } from '../apis/pluginMarketplaceApi';
          import {
            cleanupDownload,
            downloadAndExtractPlugin,
          } from '../services/plugins/pluginDownloader';
          import { upsertRegistryEntry } from '../services/plugins/pluginRegistry';
          import { usePluginStore } from '../stores/pluginStore';
          import { resolveErrorMessage } from '../utils/logging';

          type InstallPluginParams = {
            plugin: MarketplacePlugin;
          };

          export const useInstallPlugin = () => {
            const { t } = useTranslation('plugins');
            const loadPluginFromPath = usePluginStore((s) => s.loadPluginFromPath);
            const enablePlugin = usePluginStore((s) => s.enablePlugin);

            return useMutation({
              mutationFn: async ({ plugin }: InstallPluginParams) => {
                console.log(`[DEBUG PLUGIN] 1. Iniciando instalación de: ${plugin.id}`);

                const release = await pluginMarketplaceApi.getLatestRelease(plugin.repo);
                console.log(`[DEBUG PLUGIN] 2. Release obtenida: URL -> ${release.downloadUrl}`);

                console.log(`[DEBUG PLUGIN] 3. Descargando y extrayendo...`);
                const extractedPath = await downloadAndExtractPlugin({
                  pluginId: plugin.id,
                  downloadUrl: release.downloadUrl,
                });
                console.log(`[DEBUG PLUGIN] 4. Extraído correctamente en: ${extractedPath}`);

                try {
                  const now = new Date().toISOString();
                  console.log(`[DEBUG PLUGIN] 5. Actualizando registro...`);
                  await upsertRegistryEntry({
                    id: plugin.id,
                    version: release.version,
                    path: extractedPath,
                    installationMethod: 'store',
                    enabled: false,
                    installedAt: now,
                    lastUpdatedAt: now,
                  });

                  console.log(`[DEBUG PLUGIN] 6. Cargando plugin desde la ruta...`);
                  await loadPluginFromPath(extractedPath);

                  console.log(`[DEBUG PLUGIN] 7. Habilitando plugin...`);
                  await enablePlugin(plugin.id);

                  console.log(`[DEBUG PLUGIN] 8. INSTALACIÓN COMPLETADA CON ÉXITO.`);
                } catch (error) {
                  console.error(`[DEBUG PLUGIN FATAL ERROR] Fallo en la fase de carga/registro:`, error);
                  throw error;
                } finally {
                  console.log(`[DEBUG PLUGIN] 9. Limpiando archivos temporales...`);
                  await cleanupDownload(plugin.id);
                }

                return { plugin, version: release.version };
              },
              onError: (error, { plugin }) => {
                const message = resolveErrorMessage(error);
                toast.error(t('store.installError.title', { name: plugin.name }), {
                  description: message,
                });
              },
            });
          };
          EOF
          
          # 2. LOCALIZACIÓN E INYECCIÓN DIRECTA EN LA CARPETA PUBLIC
          PUBLIC_DIR="./packages/player/public"
          if [ ! -d "$PUBLIC_DIR" ]; then
            PUBLIC_DIR=$(find ./packages/player -type d -name "public" | head -n 1)
          fi

          if [ -n "$PUBLIC_DIR" ]; then
            CSS_FILE="$PUBLIC_DIR/android-fixes.css"
            echo "✔️ Generando diseño móvil en: $CSS_FILE..."
            cat << 'EOF' > "$CSS_FILE"
          /* ==========================================================================
             PARCHE DE INTERFAZ MÓVIL PARA NUCLEAR PLAYER (REVISIÓN ESTRUCTURAL)
             ========================================================================== */

          @media screen and (max-width: 768px) {
              [role="dialog"] {
                  position: fixed !important;
                  top: 50% !important; left: 50% !important;
                  transform: translate(-50%, -50%) !important;
                  width: 95vw !important; height: 85vh !important;
                  display: flex !important; flex-direction: column !important;
                  background-color: var(--bg-color, inherit) !important;
                  border-radius: 14px !important;
                  border: 1px solid rgba(128, 128, 128, 0.2) !important;
                  overflow: hidden !important;
                  zoom: 0.90 !important;
                  padding: 0 !important;
              }

              [role="dialog"] > div {
                  display: flex !important; flex-direction: column !important;
                  width: 100% !important; height: 100% !important;
              }

              [role="dialog"] [role="tablist"], [role="dialog"] nav, [role="dialog"] aside {
                  display: flex !important; flex-direction: row !important;
                  width: 100% !important; flex: 0 0 auto !important;
                  overflow-x: auto !important; padding: 12px 8px !important;
                  border-bottom: 2px solid rgba(128, 128, 128, 0.1) !important;
              }

              [role="dialog"] [role="tabpanel"], [role="dialog"] main, [role="dialog"] aside ~ div {
                  display: flex !important; flex-direction: column !important;
                  flex: 1 1 auto !important; margin-left: 0 !important; 
                  width: 100% !important; padding: 16px !important;
              }

              [role="dialog"] [role="tabpanel"] > div > div, [role="dialog"] main > div, [class*="setting" i] {
                  display: flex !important; flex-direction: row !important;
                  flex-wrap: wrap !important; justify-content: space-between !important;
                  width: 100% !important; padding: 14px 0 !important;
              }

              [role="dialog"] button, [role="dialog"] [role="button"], [class*="install-button" i] {
                  position: relative !important; z-index: 9999 !important;
                  pointer-events: auto !important; min-height: 44px !important;
              }
          }
          EOF
          else
            echo "❌ ERROR: No se encontró la carpeta 'public'. Parche abortado."
            exit 1
          fi

      - name: 🛠️ Aplicar UI de Android (Arquitectura Shadowing)
        run: |
          if [ -d "android_ui" ]; then
            cp -a android_ui/. ./
            echo "¡Archivos de UI personalizados inyectados con éxito en la RAM!"
          else
            echo "No se detectó carpeta 'android_ui'. Se utilizará la UI de escritorio original."
          fi
          
      - name: Compilar Frontend y Dependencias (React)
        run: pnpm run build --filter "@nuclearplayer/player"

      - name: Construir y Compilar APK (Tauri Android - DEBUG)
        run: |
          cd packages/player
          
          rm -rf src-tauri/gen/android
          
          npx tauri android init
          
          cp public/logo-icon-on-white.png src-tauri/icons/icon.png
          cp public/logo-icon-on-white.png src-tauri/icons/app-icon.png
          
          npx tauri icon public/logo-icon-on-white.png
          
          npx tauri android build --debug --apk --target aarch64

      - name: Subir APK final
        uses: actions/upload-artifact@v4
        with:
          name: Nuclear-Player-APK
          path: packages/player/src-tauri/gen/android/**/*.apk

name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código fuente
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar Rust (SOLO AARCH64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Obtener directorio de caché de pnpm
        id: pnpm-cache-dir
        run: echo "STORE_PATH=$(npm config get cache)" >> $GITHUB_ENV

      - name: Caché de módulos pnpm
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Caché de Rust y dependencias compiladas
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "packages/player/src-tauri"

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Instalar pnpm y dependencias
        run: |
          npm install -g pnpm@10.33.4
          pnpm install

      - name: Crear script de parcheo blindado (patch.cjs)
        run: |
          cat << 'EOF' > patch.cjs
          const fs = require("fs");
          const path = require("path");

          function overwriteSafe(filePath, modifierFunc) {
              try {
                  if (fs.existsSync(filePath)) {
                      fs.chmodSync(filePath, 0o666);
                      let content = fs.readFileSync(filePath, "utf8");
                      content = modifierFunc(content);
                      fs.writeFileSync(filePath, content, "utf8");
                      console.log(`[EXITO] Parcheado: ${filePath}`);
                  } else {
                      console.warn(`[AVISO] Archivo no encontrado: ${filePath}`);
                  }
              } catch (e) {
                  console.error(`[ERROR CRITICO] Fallo en ${filePath}:`, e);
                  process.exit(1);
              }
          }

          // 1. CARGO.TOML: Inyectar certificados WebPKI integrados para evitar el pánico JNI de Android
          overwriteSafe("./packages/player/src-tauri/Cargo.toml", (code) => {
              let lines = code.split("\n").filter(line => 
                  !line.includes("tauri-plugin-updater") &&
                  !line.includes("tauri-plugin-process") &&
                  !line.includes("tauri-plugin-window-state")
              );
              let result = lines.join("\n");
              
              // Sustitución clave: Usamos 'webpki-roots' en lugar de 'rustls-native-certs'
              result = result.replace(
                  /reqwest = \{ version = "0.13", features = \["json", "cookies", "stream"\] \}/g, 
                  'reqwest = { version = "0.13", default-features = false, features = ["json", "cookies", "stream", "rustls", "webpki-roots"] }'
              );
              
              if (!result.includes("[profile.dev]")) {
                  result += `\n\n[profile.dev]\npanic = "abort"\ncodegen-units = 1\nlto = true\nopt-level = "z"\nstrip = true\n`;
              }
              return result;
          });

          // 2. YTDLP_SETUP.RS: Cura para compilación cruzada
          overwriteSafe("./packages/player/src-tauri/src/ytdlp_setup.rs", (code) => {
              let res = code.replace(/fn release_filename\(\) -> &'static str \{[\s\S]*?fn binary_name/, "fn release_filename() -> &'static str { \"yt-dlp.zip\" }\n\nfn binary_name");
              res = res.replace(/fn binary_name\(\) -> &'static str \{[\s\S]*?fn ytdlp_dir/, "fn binary_name() -> &'static str { \"yt-dlp\" }\n\nfn ytdlp_dir");
              return res;
          });

          // 3. LIB.RS: Limpieza de código muerto
          overwriteSafe("./packages/player/src-tauri/src/lib.rs", (code) => {
              let res = code.replace(/\.plugin\(tauri_plugin_window_state::Builder::default\(\)\.build\(\)\)/g, "/* desktop plugin removed */");
              res = res.replace(/\.plugin\(tauri_plugin_updater::Builder::new\(\)\.build\(\)\)/g, "/* desktop plugin removed */");
              res = res.replace(/\.plugin\(tauri_plugin_process::init\(\)\)/g, "/* desktop plugin removed */");
              return res;
          });

          // 4. ESBUILD WASM: Corrección de ruta
          overwriteSafe("./packages/player/src/services/plugins/pluginCompiler.ts", (code) => {
              return code.replace(
                /await es\.mod\.initialize\(\{[\s\S]*?wasmURL:\s*wasmUrl,[\s\S]*?worker:\s*false\s*\}\);/g,
                `const fullWasmUrl = new URL(wasmUrl, window.location.origin).href;\n      await es.mod.initialize({ wasmURL: fullWasmUrl, worker: false });`
              );
          });

          // 5. CAPABILITIES: Permisos de FileSystem
          const capsDir = "./packages/player/src-tauri/capabilities";
          try {
              if (fs.existsSync(capsDir)) {
                  const almightyCap = {
                      identifier: "android-almighty",
                      windows: ["*"],
                      permissions: [
                        "core:window:allow-set-decorations", "core:window:allow-set-size", "core:window:allow-maximize", "core:window:allow-minimize", "core:window:allow-close", "core:window:allow-hide", "core:window:allow-show", "fs:allow-read", "fs:allow-write", "fs:allow-exists", "fs:allow-stat", "fs:allow-read-dir", "fs:allow-mkdir", "fs:allow-remove", "fs:scope-appdata-recursive"
                      ]
                  };
                  fs.writeFileSync(path.join(capsDir, "android-almighty.json"), JSON.stringify(almightyCap, null, 2));
              }
          } catch(e) { console.error("Error en capabilities:", e); }
          EOF

      - name: 🛠️ Aplicar Interfaz de Android (Shadowing de android_ui)
        run: |
          if [ -d "android_ui" ]; then
            cp -a android_ui/. ./
            echo "✅ Archivos estáticos aplicados."
          else
            echo "❌ Carpeta android_ui no encontrada, ignorando..."
          fi
          
      - name: Compilar Frontend (React)
        run: |
          cd packages/player
          pnpm run build:frontend

      - name: Inicializar Proyecto Android (Generar Rutas)
        run: |
          cd packages/player
          rm -rf src-tauri/gen/android
          npx tauri android init
          cp public/logo-icon-on-white.png src-tauri/icons/icon.png
          cp public/logo-icon-on-white.png src-tauri/icons/app-icon.png
          npx tauri icon public/logo-icon-on-white.png

      - name: 🛠️ Ejecutar Parches de Compatibilidad
        run: node patch.cjs

      - name: Construir y Compilar APK (Firmado Automático + Optimizado)
        run: |
          cd packages/player
          npx tauri android build --debug --apk --target aarch64

      - name: "🚀 Bypass: Empaquetar como GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          name: "Nuclear Android Build (Nightly)"
          tag_name: "build-${{ github.run_id }}"
          files: packages/player/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          body: "APK compilado, firmado y optimizado automáticamente."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

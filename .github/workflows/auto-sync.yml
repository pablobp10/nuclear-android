name: Auto-Sync Upstream

on:
  schedule:
    # El vigilante se despierta automáticamente todos los días a las 3:00 AM (Hora UTC)
    - cron: '0 3 * * *'
  # Este comando añade el botón "Run workflow" para que lo lances MANUALMENTE cuando quieras
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Descargar tu código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Git Bot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sincronizar con el código original (Nuclear)
        id: sync
        run: |
          # Añadimos la fuente original
          git remote add upstream https://github.com/nukeop/nuclear.git
          git fetch upstream
          
          # Guardamos el hash del commit actual
          ESTADO_PREVIO=$(git rev-parse HEAD)
          
          # Fusionamos su código dando prioridad al código de ellos si hay conflictos (-X theirs)
          git merge upstream/master --allow-unrelated-histories -X theirs --no-edit
          
          ESTADO_NUEVO=$(git rev-parse HEAD)
          
          if [ "$ESTADO_PREVIO" != "$ESTADO_NUEVO" ]; then
            # Si hay código nuevo, guardamos los cambios en tu repositorio
            git push origin main
            echo "cambios_nuevos=true" >> $GITHUB_OUTPUT
            echo "¡Actualización detectada y fusionada con éxito!"
          else
            echo "cambios_nuevos=false" >> $GITHUB_OUTPUT
            echo "Todo está al día. El creador original no ha subido nada nuevo."
          fi

      - name: Disparar la compilación del APK
        # Este paso SOLO se ejecuta si el paso anterior detectó cambios reales
        if: steps.sync.outputs.cambios_nuevos == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Usamos la CLI de GitHub para ejecutar tu android.yml
          # La bandera --repo fuerza a que busque el workflow en tu fork, evitando el error 404
          gh workflow run android.yml --ref main --repo ${{ github.repository }}
          echo "¡Orden de compilación enviada al Constructor (android.yml)!"

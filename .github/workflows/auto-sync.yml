name: Auto-Sync Upstream

on:
  schedule:
    # Se ejecuta automáticamente todos los días a las 3:00 AM (UTC)
    - cron: '0 3 * * *'
  # Habilita el botón para lanzarlo MANUALMENTE desde la pestaña Actions
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Descargar tu código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Git Bot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sincronizar con el código original
        id: sync
        run: |
          # Añadimos el repositorio original del creador
          git remote add upstream https://github.com/nukeop/nuclear.git
          git fetch upstream
          
          # Guardamos el estado actual para comparar después
          ESTADO_PREVIO=$(git rev-parse HEAD)
          
          # Fusionamos su rama master con tu rama main
          git merge upstream/master --no-edit
          
          # Comprobamos si el merge ha traído código nuevo
          ESTADO_NUEVO=$(git rev-parse HEAD)
          if [ "$ESTADO_PREVIO" != "$ESTADO_NUEVO" ]; then
            git push origin main
            echo "cambios_nuevos=true" >> $GITHUB_OUTPUT
            echo "¡Actualización detectada y guardada!"
          else
            echo "cambios_nuevos=false" >> $GITHUB_OUTPUT
            echo "Todo está al día. No hay nada nuevo en el original."
          fi

      - name: Disparar compilación del APK
        # Si GitHub Actions hace un push, no dispara otros workflows por seguridad.
        # Por eso, usamos la CLI de GitHub para pulsar el botón de compilar a la fuerza.
        if: steps.sync.outputs.cambios_nuevos == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run android.yml --ref main
          echo "¡Orden de compilar el nuevo APK enviada al Constructor!"
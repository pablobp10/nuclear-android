name: Auto-Sync Upstream

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Descargar tu código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Git Bot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sincronizar con el código original (Nuclear)
        id: sync
        run: |
          git remote add upstream https://github.com/nukeop/nuclear.git
          git fetch upstream
          
          ESTADO_PREVIO=$(git rev-parse HEAD)
          
          # 1. ACTUALIZACIÓN AGRESIVA (-X theirs): El código del autor original manda siempre en caso de conflicto.
          git merge upstream/master --squash -X theirs --allow-unrelated-histories || true
          
          # 2. RESCATE DEL NÚCLEO DURO (Obligatorio para no perder el repositorio)
          # Rescatamos tu contrato legal, tus scripts y tu carpeta UI de la sobrescritura justo antes de guardar.
          git reset HEAD .github/ README.md patch.cjs android_ui/ || true
          git checkout HEAD -- .github/ README.md patch.cjs android_ui/ || true
          
          # 3. Reporte de Diff por consola para fácil debugging si la build falla
          echo "=== ARCHIVOS ACTUALIZADOS DESDE UPSTREAM ==="
          git diff --cached --name-status
          echo "==========================================="
          
          # Guardado final de la sincronización
          git commit -m "Auto-Sync: Actualización agresiva desde upstream (Squash)" || true
          
          ESTADO_NUEVO=$(git rev-parse HEAD)
          
          if [ "$ESTADO_PREVIO" != "$ESTADO_NUEVO" ]; then
            git push origin main
            echo "cambios_nuevos=true" >> $GITHUB_OUTPUT
            echo "¡Actualización detectada y fusionada (Prioridad Upstream)!"
          else
            echo "cambios_nuevos=false" >> $GITHUB_OUTPUT
            echo "Todo está al día. El creador original no ha subido nada nuevo."
          fi

      - name: Disparar la compilación del APK
        if: steps.sync.outputs.cambios_nuevos == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run android.yml --ref main
          echo "¡Orden de compilación enviada al Constructor!"

name: Auto-Sync Upstream

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Descargar tu código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Git Bot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sincronizar con el código original (Nuclear)
        id: sync
        run: |
          git remote add upstream https://github.com/nukeop/nuclear.git
          git fetch upstream
          
          ESTADO_PREVIO=$(git rev-parse HEAD)
          
          # ESTRATEGIA SQUASH: Fusión sin historiales problemáticos
          git merge upstream/master --squash -X theirs --allow-unrelated-histories || true
          
          # Protección absoluta de la carpeta .github
          git reset HEAD .github/ || true
          git checkout HEAD -- .github/ || true
          
          # Guardado limpio como bot estándar
          git commit -m "Auto-Sync: Actualización limpia desde upstream (Squash)" || true
          
          ESTADO_NUEVO=$(git rev-parse HEAD)
          
          if [ "$ESTADO_PREVIO" != "$ESTADO_NUEVO" ]; then
            # El push estándar ahora funciona siempre
            git push origin main
            echo "cambios_nuevos=true" >> $GITHUB_OUTPUT
            echo "¡Actualización detectada y fusionada con éxito!"
          else
            echo "cambios_nuevos=false" >> $GITHUB_OUTPUT
            echo "Todo está al día. El creador original no ha subido nada nuevo."
          fi

      - name: Disparar la compilación del APK
        # Se lanza si hay código nuevo, O si has pulsado el botón manualmente
        if: steps.sync.outputs.cambios_nuevos == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Llama al constructor (android.yml) de forma segura
          gh workflow run android.yml --ref main --repo ${{ github.repository }}
          echo "¡Orden de compilación enviada al Constructor (android.yml)!"
